      interval: monthly
    groups:
      docker-dependencies:
        patterns:
          - "*"

  # Docker - docs site
  - package-ecosystem: docker
    directory: /services/docs
    schedule:
      interval: monthly
    groups:
      docker-dependencies:
        patterns:
          - "*"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    groups:
      github-actions:
        patterns:
          - "*"
