version: 2
updates:
  # Go modules - metrics backend
  - package-ecosystem: gomod
    directory: /extensions/metrics/backend
    schedule:
      interval: monthly
    groups:
      go-dependencies:
        patterns:
          - "*"

  # Go modules - backups backend
  - package-ecosystem: gomod
    directory: /extensions/backups/backend
    schedule:
      interval: monthly
    groups:
      go-dependencies:
        patterns:
          - "*"

  # Go modules - networking backend
  - package-ecosystem: gomod
    directory: /extensions/networking/backend
    schedule:
      interval: monthly
    groups:
      go-dependencies:
        patterns:
          - "*"

  # Go modules - logs backend
  - package-ecosystem: gomod
    directory: /extensions/logs/backend
    schedule:
      interval: monthly
    groups:
      go-dependencies:
        patterns:
          - "*"

  # Go modules - vulnerabilities backend
  - package-ecosystem: gomod
    directory: /extensions/vulnerabilities/backend
    schedule:
      interval: monthly
    groups:
      go-dependencies:
        patterns:
          - "*"

  # Go modules - integration tests
  - package-ecosystem: gomod
    directory: /tests
    schedule:
      interval: monthly
    groups:
      go-dependencies:
        patterns:
          - "*"

  # npm - metrics UI
  - package-ecosystem: npm
    directory: /extensions/metrics/ui
    schedule:
      interval: monthly
    groups:
      npm-dependencies:
        patterns:
          - "*"

  # npm - backups UI
  - package-ecosystem: npm
    directory: /extensions/backups/ui
    schedule:
      interval: monthly
    groups:
      npm-dependencies:
        patterns:
          - "*"

  # npm - networking UI
  - package-ecosystem: npm
    directory: /extensions/networking/ui
    schedule:
      interval: monthly
    groups:
      npm-dependencies:
        patterns:
          - "*"

  # npm - logs UI
  - package-ecosystem: npm
    directory: /extensions/logs/ui
    schedule:
      interval: monthly
    groups:
      npm-dependencies:
        patterns:
          - "*"

  # npm - vulnerabilities UI
  - package-ecosystem: npm
    directory: /extensions/vulnerabilities/ui
    schedule:
      interval: monthly
    groups:
      npm-dependencies:
        patterns:
          - "*"

  # npm - argoplane coordinator UI
  - package-ecosystem: npm
    directory: /extensions/argoplane/ui
    schedule:
      interval: monthly
    groups:
      npm-dependencies:
        patterns:
          - "*"

  # npm - docs site
  - package-ecosystem: npm
    directory: /services/docs
    schedule:
      interval: monthly
    groups:
      npm-dependencies:
        patterns:
          - "*"

  # Docker - metrics backend
  - package-ecosystem: docker
    directory: /extensions/metrics/backend
    schedule:
      interval: monthly
    groups:
      docker-dependencies:
        patterns:
          - "*"

  # Docker - backups backend
  - package-ecosystem: docker
    directory: /extensions/backups/backend
    schedule:
      interval: monthly
    groups:
      docker-dependencies:
        patterns:
          - "*"

  # Docker - networking backend
  - package-ecosystem: docker
    directory: /extensions/networking/backend
    schedule:
      interval: monthly
    groups:
      docker-dependencies:
        patterns:
          - "*"

  # Docker - logs backend
  - package-ecosystem: docker
    directory: /extensions/logs/backend
    schedule:
      interval: monthly
    groups:
      docker-dependencies:
        patterns:
          - "*"

  # Docker - vulnerabilities backend
  - package-ecosystem: docker
