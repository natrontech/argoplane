apiVersion: apps/v1
kind: Deployment
metadata:
  name: argoplane-backups-backend
  namespace: argocd
  labels:
    app.kubernetes.io/name: argoplane-backups-backend
    app.kubernetes.io/part-of: argoplane
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: argoplane-backups-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: argoplane-backups-backend
        app.kubernetes.io/part-of: argoplane
    spec:
      containers:
        - name: backend
          image: argoplane-backups-backend:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
              protocol: TCP
          env:
            - name: PORT
              value: "8081"
            - name: LOG_LEVEL
              value: "info"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            allowPrivilegeEscalation: false
---
apiVersion: v1
kind: Service
metadata:
  name: argoplane-backups-backend
  namespace: argocd
  labels:
    app.kubernetes.io/name: argoplane-backups-backend
    app.kubernetes.io/part-of: argoplane
spec:
  ports:
    - port: 8081
      targetPort: 8081
      protocol: TCP
  selector:
    app.kubernetes.io/name: argoplane-backups-backend
