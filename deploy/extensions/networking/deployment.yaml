apiVersion: apps/v1
kind: Deployment
metadata:
  name: argoplane-networking-backend
  namespace: argocd
  labels:
    app.kubernetes.io/name: argoplane-networking-backend
    app.kubernetes.io/part-of: argoplane
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: argoplane-networking-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: argoplane-networking-backend
        app.kubernetes.io/part-of: argoplane
    spec:
      serviceAccountName: argoplane-networking-backend
      containers:
        - name: backend
          image: argoplane-networking-backend:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
              protocol: TCP
          env:
            - name: PORT
              value: "8082"
            - name: LOG_LEVEL
              value: "info"
            - name: HUBBLE_RELAY_URL
              value: "hubble-relay.kube-system.svc:80"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8082
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            allowPrivilegeEscalation: false
---
apiVersion: v1
kind: Service
metadata:
  name: argoplane-networking-backend
  namespace: argocd
  labels:
    app.kubernetes.io/name: argoplane-networking-backend
    app.kubernetes.io/part-of: argoplane
spec:
  ports:
    - port: 8082
      targetPort: 8082
      protocol: TCP
  selector:
    app.kubernetes.io/name: argoplane-networking-backend
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argoplane-networking-backend
  namespace: argocd
  labels:
    app.kubernetes.io/name: argoplane-networking-backend
    app.kubernetes.io/part-of: argoplane
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: argoplane-networking-reader
  labels:
    app.kubernetes.io/part-of: argoplane
rules:
  - apiGroups: ["cilium.io"]
    resources:
      - ciliumnetworkpolicies
      - ciliumclusterwidenetworkpolicies
      - ciliumendpoints
      - ciliumidentities
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argoplane-networking-reader
  labels:
    app.kubernetes.io/part-of: argoplane
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: argoplane-networking-reader
subjects:
  - kind: ServiceAccount
    name: argoplane-networking-backend
    namespace: argocd
