apiVersion: v1
kind: ServiceAccount
metadata:
  name: argoplane-logs-backend
  namespace: argocd
  labels:
    app.kubernetes.io/name: argoplane-logs-backend
    app.kubernetes.io/part-of: argoplane
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: argoplane-logs
  labels:
    app.kubernetes.io/name: argoplane-logs-backend
    app.kubernetes.io/part-of: argoplane
rules:
  # Reads ArgoCD Applications to authorize namespace scoping.
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argoplane-logs
  labels:
    app.kubernetes.io/name: argoplane-logs-backend
    app.kubernetes.io/part-of: argoplane
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: argoplane-logs
subjects:
  - kind: ServiceAccount
    name: argoplane-logs-backend
    namespace: argocd
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argoplane-logs-backend
  namespace: argocd
  labels:
    app.kubernetes.io/name: argoplane-logs-backend
    app.kubernetes.io/part-of: argoplane
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: argoplane-logs-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: argoplane-logs-backend
        app.kubernetes.io/part-of: argoplane
    spec:
      serviceAccountName: argoplane-logs-backend
      containers:
        - name: backend
          image: argoplane-logs-backend:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8083
              protocol: TCP
          env:
            - name: PORT
              value: "8083"
            - name: LOKI_URL
              value: "http://loki.monitoring.svc:3100"
            - name: LOG_LEVEL
              value: "info"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8083
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8083
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            allowPrivilegeEscalation: false
---
apiVersion: v1
kind: Service
metadata:
  name: argoplane-logs-backend
  namespace: argocd
  labels:
    app.kubernetes.io/name: argoplane-logs-backend
    app.kubernetes.io/part-of: argoplane
spec:
  ports:
    - port: 8083
      targetPort: 8083
      protocol: TCP
  selector:
    app.kubernetes.io/name: argoplane-logs-backend
