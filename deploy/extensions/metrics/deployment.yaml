apiVersion: apps/v1
kind: Deployment
metadata:
  name: argoplane-metrics-backend
  namespace: argocd
  labels:
    app.kubernetes.io/name: argoplane-metrics-backend
    app.kubernetes.io/part-of: argoplane
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: argoplane-metrics-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: argoplane-metrics-backend
        app.kubernetes.io/part-of: argoplane
    spec:
      containers:
        - name: backend
          image: argoplane-metrics-backend:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: PORT
              value: "8080"
            - name: PROMETHEUS_URL
              value: "http://kube-prometheus-kube-prome-prometheus.monitoring.svc:9090"
            - name: LOG_LEVEL
              value: "info"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            allowPrivilegeEscalation: false
---
apiVersion: v1
kind: Service
metadata:
  name: argoplane-metrics-backend
  namespace: argocd
  labels:
    app.kubernetes.io/name: argoplane-metrics-backend
    app.kubernetes.io/part-of: argoplane
spec:
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
  selector:
    app.kubernetes.io/name: argoplane-metrics-backend
