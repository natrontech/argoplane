{{- range $name, $ext := .Values.extensions }}
{{- if $ext.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argoplane-{{ $name }}-backend
  namespace: {{ include "argoplane.argocdNamespace" $ }}
  labels:
    {{- include "argoplane.extensionLabels" (dict "name" $name "root" $) | nindent 4 }}
spec:
  replicas: {{ $ext.replicas | default 1 }}
  revisionHistoryLimit: {{ $ext.revisionHistoryLimit | default 3 }}
  selector:
    matchLabels:
      {{- include "argoplane.extensionSelectorLabels" (dict "name" $name) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "argoplane.extensionSelectorLabels" (dict "name" $name) | nindent 8 }}
        {{- with $ext.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with $ext.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with $ext.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with $ext.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- include "argoplane.imagePullSecrets" $ | nindent 6 }}
      {{- if $ext.serviceAccount }}
      {{- if $ext.serviceAccount.create }}
      serviceAccountName: argoplane-{{ $name }}-backend
      {{- end }}
      {{- end }}
      containers:
        - name: backend
          image: "{{ $ext.image.repository }}:{{ $ext.image.tag | default $.Chart.AppVersion }}"
          imagePullPolicy: {{ $ext.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: http
              containerPort: {{ $ext.port }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ $ext.port | quote }}
            {{- range $key, $val := $ext.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
            {{- with $ext.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          {{- with $ext.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $ext.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with $ext.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $ext.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $ext.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
{{- end }}
