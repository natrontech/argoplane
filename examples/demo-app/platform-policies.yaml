# Platform-managed policies: deployed by the platform team, NOT part of the ArgoCD app.
# These show as "platform" ownership in the networking extension because they're
# not in the app's resource tree.
#
# Apply with: kubectl apply -f examples/demo-app/platform-policies.yaml
#
# NOTE: Clusterwide policies use nodeSelector to avoid affecting kube-system/argocd.
# In production, platform teams label app namespaces and target those labels.

---
# Clusterwide policy: allow DNS resolution for pods in app namespaces.
# Uses endpointSelector with namespace label to avoid breaking system pods.
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: platform-allow-dns
  annotations:
    description: "Platform baseline: allow DNS resolution (UDP/53, TCP/53) to kube-dns for pods in app namespaces."
  labels:
    app.kubernetes.io/managed-by: platform-team
    policy.argoplane.io/category: baseline
spec:
  endpointSelector:
    matchLabels:
      io.kubernetes.pod.namespace: argoplane-demo
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
---
# Clusterwide policy: allow health probes from kubelet for app namespaces.
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: platform-allow-health-probes
  annotations:
    description: "Platform baseline: allow kubelet health probes from host network for pods in app namespaces."
  labels:
    app.kubernetes.io/managed-by: platform-team
    policy.argoplane.io/category: baseline
spec:
  endpointSelector:
    matchLabels:
      io.kubernetes.pod.namespace: argoplane-demo
  ingress:
    - fromEntities:
        - host
---
# Namespace-scoped platform policy: allow monitoring scraping.
# Platform team deploys this to every app namespace so Prometheus can scrape.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: platform-allow-monitoring
  namespace: argoplane-demo
  annotations:
    description: "Platform policy: allow ingress from monitoring namespace for health checks and metrics scraping on ports 9090 and 8080."
  labels:
    app.kubernetes.io/managed-by: platform-team
    policy.argoplane.io/category: observability
spec:
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: monitoring
      toPorts:
        - ports:
            - port: "9090"
              protocol: TCP
            - port: "8080"
              protocol: TCP
---
# Namespace-scoped platform policy: allow intra-namespace communication.
# This is a common platform pattern: allow pods in the same namespace to talk,
# while cross-namespace traffic requires explicit rules from app teams.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: platform-restrict-cross-ns
  namespace: argoplane-demo
  annotations:
    description: "Platform policy: allow intra-namespace ingress. Cross-namespace traffic requires explicit app-level rules."
  labels:
    app.kubernetes.io/managed-by: platform-team
    policy.argoplane.io/category: isolation
spec:
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: argoplane-demo
