<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="'JetBrains Mono', 'SF Mono', monospace" font-size="12">
  <style>
    .box { stroke-width: 1; rx: 4; ry: 4; }
    .box-orange { fill: #FFF7ED; stroke: #E8935A; }
    .box-gray { fill: #FAFAF9; stroke: #E7E5E4; }
    .box-blue { fill: #DBEAFE; stroke: #93C5FD; }
    .box-green { fill: #D1FAE5; stroke: #6EE7B7; }
    .label { fill: #78716C; font-size: 10; text-transform: uppercase; letter-spacing: 0.05em; }
    .title { fill: #292524; font-weight: 600; font-size: 13; }
    .subtitle { fill: #78716C; font-size: 11; }
    .arrow { stroke: #A8A29E; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
    .arrow-orange { stroke: #E8935A; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead-orange); }
    .dashed { stroke-dasharray: 4 3; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#A8A29E"/>
    </marker>
    <marker id="arrowhead-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#E8935A"/>
    </marker>
  </defs>

  <!-- Developer Browser -->
  <rect x="20" y="20" width="180" height="80" class="box box-gray"/>
  <text x="110" y="14" text-anchor="middle" class="label">developer</text>
  <text x="110" y="52" text-anchor="middle" class="title">Browser</text>
  <text x="110" y="72" text-anchor="middle" class="subtitle">ArgoCD UI + Extensions</text>

  <!-- ArgoCD Server -->
  <rect x="280" y="20" width="240" height="80" class="box box-orange"/>
  <text x="400" y="14" text-anchor="middle" class="label">argocd namespace</text>
  <text x="400" y="52" text-anchor="middle" class="title">ArgoCD API Server</text>
  <text x="400" y="72" text-anchor="middle" class="subtitle">Auth, RBAC, Proxy Extensions</text>

  <!-- Arrow: Browser -> ArgoCD -->
  <line x1="200" y1="60" x2="272" y2="60" class="arrow-orange"/>

  <!-- Extension Backends -->
  <rect x="600" y="20" width="180" height="80" class="box box-orange"/>
  <text x="690" y="14" text-anchor="middle" class="label">extension backends</text>
  <text x="690" y="45" text-anchor="middle" class="title">Go HTTP Services</text>
  <text x="690" y="62" text-anchor="middle" class="subtitle">metrics-backend</text>
  <text x="690" y="76" text-anchor="middle" class="subtitle">backups-backend</text>

  <!-- Arrow: ArgoCD -> Backends -->
  <line x1="520" y1="60" x2="592" y2="60" class="arrow-orange"/>
  <text x="556" y="52" text-anchor="middle" class="subtitle">/extensions/*</text>
  <text x="556" y="80" text-anchor="middle" font-size="9" fill="#E8935A">+ identity headers</text>

  <!-- External Systems Row -->
  <rect x="20" y="180" width="150" height="70" class="box box-blue"/>
  <text x="95" y="174" text-anchor="middle" class="label">metrics</text>
  <text x="95" y="210" text-anchor="middle" class="title">Prometheus</text>
  <text x="95" y="226" text-anchor="middle" class="subtitle">PromQL queries</text>

  <rect x="200" y="180" width="150" height="70" class="box box-blue"/>
  <text x="275" y="174" text-anchor="middle" class="label">backups</text>
  <text x="275" y="210" text-anchor="middle" class="title">Velero</text>
  <text x="275" y="226" text-anchor="middle" class="subtitle">Schedules, Backups</text>

  <rect x="380" y="180" width="150" height="70" class="box box-blue"/>
  <text x="455" y="174" text-anchor="middle" class="label">networking</text>
  <text x="455" y="210" text-anchor="middle" class="title">Cilium / Hubble</text>
  <text x="455" y="226" text-anchor="middle" class="subtitle">Policies, Flows</text>

  <rect x="560" y="180" width="220" height="70" class="box box-green"/>
  <text x="670" y="174" text-anchor="middle" class="label">platform</text>
  <text x="670" y="210" text-anchor="middle" class="title">Kubernetes API</text>
  <text x="670" y="226" text-anchor="middle" class="subtitle">CRDs, StorageClasses, Nodes</text>

  <!-- Arrows: Backends -> External Systems -->
  <path d="M 690 100 L 690 140 L 95 140 L 95 172" class="arrow dashed"/>
  <path d="M 690 100 L 690 140 L 275 140 L 275 172" class="arrow dashed"/>
  <path d="M 690 100 L 690 140 L 455 140 L 455 172" class="arrow dashed"/>
  <path d="M 690 100 L 690 140 L 670 140 L 670 172" class="arrow dashed"/>

  <!-- RBAC / Multi-tenancy section -->
  <rect x="20" y="300" width="760" height="70" class="box box-gray" style="stroke-dasharray: 4 3;"/>
  <text x="400" y="294" text-anchor="middle" class="label">rbac &amp; multi-tenancy</text>
  <text x="120" y="332" text-anchor="middle" class="title">AppProjects</text>
  <text x="120" y="348" text-anchor="middle" class="subtitle">Tenant isolation</text>
  <text x="310" y="332" text-anchor="middle" class="title">OIDC / SSO</text>
  <text x="310" y="348" text-anchor="middle" class="subtitle">Authentication</text>
  <text x="500" y="332" text-anchor="middle" class="title">RBAC Policies</text>
  <text x="500" y="348" text-anchor="middle" class="subtitle">extensions, invoke, &lt;name&gt;</text>
  <text x="690" y="332" text-anchor="middle" class="title">Identity Headers</text>
  <text x="690" y="348" text-anchor="middle" class="subtitle">Username, Groups, Cluster</text>

  <!-- Extension Categories -->
  <text x="400" y="408" text-anchor="middle" class="label">extension categories</text>
  <rect x="20" y="420" width="240" height="50" class="box box-orange"/>
  <text x="30" y="445" font-weight="600" font-size="13" fill="#E8935A">Discover</text>
  <text x="30" y="460" class="subtitle">StorageClasses, CRDs, Operators</text>

  <rect x="280" y="420" width="240" height="50" class="box box-orange"/>
  <text x="290" y="445" font-weight="600" font-size="13" fill="#E8935A">Observe</text>
  <text x="290" y="460" class="subtitle">Metrics, Backups, Logs, Costs</text>

  <rect x="540" y="420" width="240" height="50" class="box box-orange"/>
  <text x="550" y="445" font-weight="600" font-size="13" fill="#E8935A">Secure</text>
  <text x="550" y="460" class="subtitle">Vulnerabilities, Policies, Secrets</text>
</svg>
